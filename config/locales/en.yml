en:
  telegram_webhooks:
    commands:
      description:
        start: "🚀 Start interacting with the bot and get instructions on how to use it"
        help: "❓ Get instructions on how to use the bot"
        balance: "💰 Check your current balance"
        activate_token: "🔑 Activate a token"
        prompt_to_video: "🎬 Prompt → picture → video"
        prompt_to_image: "🖼 Prompt → image"
        prompt_policy: "🛡 View prompt policy rules"
        set_locale: "🌐 Set language"
        image_to_video: "🖼🎬 Picture → video"
      start: 
        no_token: |
          👋 Hi! Great to see you here.

          🤖 With this bot, you can generate images and videos using different AI models.

          🎨 To generate an image, type:
          /prompt_to_image

          🎬 To generate a video, type:
          /prompt_to_video

          💰 To check your balance, type:
          /balance

          🔑 To activate a token, type:
          /activate_token

          ℹ️ Each generation costs credits.
          To top up your balance, use /activate_token and enter a valid token.

          Tokens are provided by the administrator.
        with_valid_token: |
          🤖 With this bot, you can generate images and videos using different AI models.

          🎨 To generate an image:
          /prompt_to_image

          🎬 To generate a video:
          /prompt_to_video

          💰 To check your balance:
          /balance
      help: |
        🤖 With this bot, you can generate images and videos using different AI models.

        🎨 To generate an image, type:
        /prompt_to_image

        🎬 To generate a video, type:
        /prompt_to_video

        💰 To check your balance, type:
        /balance

        🔑 To activate a token, type:
        /activate_token

        ℹ️ Each generation costs credits.
        To top up your balance, use /activate_token and enter a valid token.

        Tokens are provided by the administrator.
      prompt_to_video: "Great! Now please provide a prompt for the video. It can later be extended with the help of the bot."
      prompt_to_image: "Great! Now please provide a prompt for the image. It can later be extended with the help of the bot."
      image_to_video: "Great! Now please send me the image you want to turn into a video. It can be sent as a URL (you can copy it from previous messages if needed)."
      image_to_video_unavailable: "Sorry, this feature is still in development. Please try again later."
      image_from_reference: "Great! Now please send me the reference image you want to use to generate a new image."
      prompt_policy: |
        Prompt policy 🛡

        ♦️ Do not request sexual content.

        ♦️ Do not request graphic violence, self-harm, or dangerous wrongdoing.

        ♦️ Do not request hateful or harassing content.
      balance:
        one: "Your current balance is %{balance} credit."
        other: "Your current balance is %{balance} credits."
      activate_token:
        ask: "Please enter your token to activate it:"
        activated: |
          ✅ Your token has been successfully activated!

          🎉 You have received %{credits} credits.
      set_locale:
        ask: "Please select your preferred language:"
        locale_updated: "Your language has been updated 🌐"
    message:
      image_message_url: "Here is your image"
      image_message_reply: "Great! You can now generate a video using one of the processors (Kling)"
      extended_prompt_postfix: "Here is your extended prompt ⬆️ \n\nYou can now generate an image using one of the processors (Mystic/Gemini/Imagen)"
      image_generated_prefix: "Here is your %{processor_name} 🖼️"
      image_generated_postfix: "You can now generate a video using one of the processors (Kling)"
      video_generated_prefix: "Here is your %{processor_name} 🎥"
      prompt_suffix: |
        What do you want to do next? You can: 
        
        🔹 extend the prompt
          
        🔹 generate an image using one of the processors (Mystic/Gemini/Imagen)
      provide_prompt: "Please provide the description (optional)"
      buttons:
        prompt:
          extend_prompt:
            one: "Extend prompt (%{count} credit)"
            other: "Extend prompt (%{count} credits)"
        generate_image:
          mystic_image: 
            one: "Mystic (%{count} credit)"
            other: "Mystic (%{count} credits)"
          gemini_image:
            one: "Gemini (%{count} credit)"
            other: "Gemini (%{count} credits)"
          imagen_image:
            one: "Imagen (%{count} credit)"
            other: "Imagen (%{count} credits)"
        generate_video:
          kling_2_1_pro_image_to_video:
            one: "Kling Pro 2.1 (%{count} credit)"
            other: "Kling Pro 2.1 (%{count} credits)"
        set_locale:
          en: "English"
          ru: "Русский"
          es: "Español"
      image_processed: "Open image"
      video_processed: "Open video"
  errors:
    prompt_forgotten: "Please provide the prompt again"
    extend_prompt_error: "Sorry, I couldn't process your request. Please try again later."
    parent_not_found: "Sorry, I couldn't find the parent request. Please provide a new command."
    empty_generation_our_fault_prompt: "I'm sorry we couldn't generate the prompt. The problem is on our side. You will be refunded."
    empty_generation_our_fault_image: "I'm sorry we couldn't generate the image. The problem is on our side. You will be refunded."
    empty_generation_our_fault_video: "I'm sorry we couldn't generate the video. The problem is on our side. You will be refunded."
    image_generating_error: "Sorry, I couldn't generate the image. Please try again later."
    image_generating_timeout_error: "Sorry, the image generation is taking too long. Please try again later."
    video_generating_error: "Sorry, I couldn't generate the video. Please try again later."
    video_generating_timeout_error: "Sorry, the video generation is taking too long. Please try again later."
    command_unknown: "Oops! It looks like you haven’t selected a command yet. Please choose one and follow the instructions."
    unknown: "Oops! Something went wrong. Please try again later."
    wrong_message_type: "The type of message you sent is not suitable for this command. Please send the correct type of message and try again."
    image_forgotten: "It seems like the image link is missing. Please try again."
    image_not_ready: "Image is still preparing ⌛ Please wait a few seconds and tap again"
    image_resolution: "The image is too small. Please send an image with minimum resolution of 300x300 px."
    image_url_invalid: "The image link is invalid, or the URL may not contain an image ⚠️ \n\nPlease make sure the image at the URL is in JPEG, JPG, or PNG format, and send a valid direct image URL. Alternatively, you can send an image as a file 📁 or picture 🖼️"
    command_request_forgotten: "It seems like your previous command request is missing. Please start over and provide the necessary information."
    unauthorized: "Seems you need to activate a token first 🔑"
    token_not_found: "Sorry, the token you provided is invalid. You can ask administrator for a valid token."
    token_used: "Sorry, the token you provided has already been used."
    token_expired: "Sorry, the token you provided has expired."
    insufficient_credits: "Sorry, it looks like you don't have enough credits to perform this action 💰"
    moderation: "Your message cannot be processed because it violates our content policy. See the rules: /prompt_policy"
  telegram:
    generation:
      processing: Generating %{process_name}, please wait…
      humanized_process_names:
        extend_prompt: "prompt"
        video:
          kling_2_1_pro_image_to_video: "Kling Pro video"
        image:
          mystic_image: "Mystic image"
          gemini_image: "Gemini image"
          imagen_image: "Imagen image"

