      start:
        no_token: |
          👋 Привет!

          🤖 С помощью этого бота ты можешь создавать изображения, видео и аудио с использованием различных AI-моделей.

          🎨 Чтобы создать изображение, введи:
          /prompt_to_image

          🔊 Чтобы создать аудио, введи:
          /prompt_to_audio

          🎬 Чтобы создать видео, введи:
          /prompt_to_video

          💰 Чтобы проверить баланс, введи:
          /balance

          🔑 Чтобы активировать токен, введи:
          /activate_token

          ℹ️ Каждая генерация выполняется за кредиты.
          Чтобы пополнить баланс, введи /activate_token и введи действительный токен.

          Токены предоставляются администратором.
