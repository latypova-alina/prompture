ru:
  telegram_webhooks:
    commands:
      description:
        start: "🚀 Начать работу с ботом и получить инструкции"
        help: "❓ Как пользоваться ботом"
        balance: "💰 Проверить текущий баланс"
        activate_token: "🔑 Активировать токен"
        prompt_to_video: "🎬 Промпт → изображение → видео"
        prompt_to_image: "🖼 Промпт → изображение"
        prompt_policy: "🛡 Правила промптов"
        set_locale: "🌐 Выбрать язык"
      start:
        no_token: |
          👋 Привет!

          🤖 С помощью этого бота ты можешь создавать изображения и видео с использованием различных AI-моделей.

          🎨 Чтобы создать изображение, введи:
          /prompt_to_image

          🎬 Чтобы создать видео, введи:
          /prompt_to_video

          💰 Чтобы проверить баланс, введи:
          /balance

          🔑 Чтобы активировать токен, введи:
          /activate_token

          ℹ️ Каждая генерация выполняется за кредиты.
          Чтобы пополнить баланс, введи /activate_token и введи действительный токен.

          Токены предоставляются администратором.
        with_valid_token: |
          🤖 С помощью этого бота ты можешь создавать изображения и видео с использованием различных AI-моделей.

          🎨 Чтобы создать изображение:
          /prompt_to_image

          🎬 Чтобы создать видео:
          /prompt_to_video

          💰 Чтобы проверить баланс:
          /balance
      help: |
        🤖 С помощью этого бота ты можешь создавать изображения и видео с использованием различных AI-моделей.

        🎨 Чтобы создать изображение:
        /prompt_to_image

        🎬 Чтобы создать видео:
        /prompt_to_video

        💰 Чтобы проверить баланс:
        /balance

        🔑 Чтобы активировать токен, введи:
          /activate_token
        
        ℹ️ Каждая генерация выполняется за кредиты. Чтобы пополнить баланс, введи /activate_token и введи действительный токен.

        Токены предоставляются администратором.
      prompt_to_video: "Отлично! Теперь напиши промпт для видео. При необходимости бот поможет его улучшить."
      prompt_to_image: "Отлично! Теперь напиши промпт для изображения. При необходимости бот поможет его улучшить."
      image_to_video: "Отлично! Теперь отправь изображение, которое ты хочешь превратить в видео."
      image_from_reference: "Отлично! Теперь отправь референсное изображение, которое ты хочешь использовать для генерации нового изображения."
      prompt_policy: |
        Правила промптов 🛡

        ♦️ Нельзя запрашивать сексуальный контент.

        ♦️ Нельзя запрашивать жестокое насилие, самоповреждение или опасные противоправные действия.

        ♦️ Нельзя запрашивать контент с ненавистью или травлей.
      balance: "Текущий баланс: %{balance} кредитов."
      activate_token:
        ask: "Введи токен для активации:"
        activated: |
          ✅ Токен успешно активирован!

          🎉 На твой баланс начислено %{credits} кредитов.
      set_locale:
        ask: "Пожалуйста, выбери язык:"
        locale_updated: "Ваш язык был обновлён 🌐"
    message:
      prompt_prefix: "Вот твой промпт:"
      prompt_suffix: | 
        Что ты хочешь сделать дальше? Ты можешь:
          
        🔹 расширить промпт (👉 ⚠️ результат будет на английском языке для улучшения качества генерации)
          
        🔹 сгенерировать изображение с помощью одного из процессоров (Mystic/Gemini/Imagen)
      provide_prompt: "Пожалуйста, укажи промпт (необязательно)"
      buttons:
        prompt:
          extend_prompt:
            one: "Расширить промпт (%{count} кредит)"
            few: "Расширить промпт (%{count} кредита)"
            many: "Расширить промпт (%{count} кредитов)"
            other: "Расширить промпт (%{count} кредитов)"
        generate_image:
          mystic_image: 
            one: "Mystic (%{count} кредит)"
            few: "Mystic (%{count} кредита)"
            many: "Mystic (%{count} кредитов)"
            other: "Mystic (%{count} кредитов)"
          gemini_image:
            one: "Gemini (%{count} кредит)"
            few: "Gemini (%{count} кредита)"
            many: "Gemini (%{count} кредитов)"
            other: "Gemini (%{count} кредитов)"
          imagen_image:
            one: "Imagen (%{count} кредит)"
            few: "Imagen (%{count} кредита)"
            many: "Imagen (%{count} кредитов)"
            other: "Imagen (%{count} кредитов)"              
        generate_video:
          kling_2_1_pro_image_to_video:
            one: "Kling Pro 2.1 (%{count} кредит)"
            few: "Kling Pro 2.1 (%{count} кредита)"
            many: "Kling Pro 2.1 (%{count} кредитов)"
            other: "Kling Pro 2.1 (%{count} кредитов)"
        set_locale:
          en: "English"
          ru: "Русский"
          es: "Español"
      image_processed: "Открыть изображение"
      video_processed: "Открыть видео"
  errors:
    prompt_forgotten: "Пожалуйста, введи промпт ещё раз."
    extend_prompt_error: "К сожалению, не удалось обработать запрос. Попробуй позже."
    parent_not_found: "К сожалению, не удалось найти исходный запрос. Пожалуйста, введи новую команду."
    empty_generation_our_fault_prompt: "К сожалению, мы не смогли сгенерировать промпт. Проблема на нашей стороне. Средства будут возвращены."
    empty_generation_our_fault_image: "К сожалению, мы не смогли сгенерировать изображение. Проблема на нашей стороне. Средства будут возвращены."
    empty_generation_our_fault_video: "К сожалению, мы не смогли сгенерировать видео. Проблема на нашей стороне. Средства будут возвращены."
    image_generating_error: "К сожалению, не удалось сгенерировать изображение. Попробуй позже."
    image_generating_timeout_error: "К сожалению, генерация изображения занимает слишком много времени. Попробуй позже."
    video_generating_error: "К сожалению, не удалось сгенерировать видео. Попробуй позже."
    video_generating_timeout_error: "К сожалению, генерация видео занимает слишком много времени. Попробуй позже."
    command_unknown: "Ой! Похоже, ты ещё не выбрал команду. Пожалуйста, выбери команду и следуй инструкциям."
    unknown: "Ой! Что-то пошло не так. Попробуй позже."
    wrong_message_type: "Тип отправленного сообщения не подходит для этой команды. Пожалуйста, отправь сообщение нужного типа и попробуй снова."
    image_forgotten: "Похоже, ссылка на изображение отсутствует. Пожалуйста, попробуй снова."
    command_request_forgotten: "Похоже, предыдущий запрос отсутствует. Пожалуйста, начни заново и введи необходимую информацию."
    unauthorized: "Сначала нужно активировать токен 🔑"
    token_not_found: "К сожалению, указанный токен недействителен. Ты можешь запросить действительный токен у администратора."
    token_used: "К сожалению, указанный токен уже был использован."
    token_expired: "К сожалению, срок действия указанного токена истёк."
    insufficient_credits: "К сожалению, на балансе недостаточно кредитов для выполнения этого действия :("
    moderation: "Ваше сообщение не может быть обработано, так как нарушает правила контента. Смотрите правила: /prompt_policy"
  telegram:
    generation:
      processing: "Генерируется %{process_name}, пожалуйста, подожди…"
      humanized_process_names:
        extend_prompt: "промпт"
        video:
          kling_2_1_pro_image_to_video: "видео Kling Pro"
        image:
          mystic_image: "изображение Mystic"
          gemini_image: "изображение Gemini"
          imagen_image: "изображение Imagen"
