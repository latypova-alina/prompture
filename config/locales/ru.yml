        Вот доступные команды для администратора:

        🔹 /random_script - сгенерировать случайный скрипт

        🔹 /motivation_workflow_en - мотивационный скрипт, аудио и кинематографические видео-промпты (английский)

        🔹 /motivation_workflow_pl - мотивационный скрипт, аудио и кинематографические видео-промпты (польский)

        🔹 /motivation_workflow_ru - мотивационный скрипт, аудио и кинематографические видео-промпты (русский)

        🔹 /generate_script %template_name% - сгенерировать скрипт из параметра template_name

        🔹 /script_templates - показать доступные шаблоны скриптов

        🔹 /random_character - сгенерировать изображение случайного персонажа

        🔹 /brainrot_character - сгенерировать изображение brainrot-персонажа

        🔹 /cartoon_character - сгенерировать изображение мультяшного персонажа для детей

        🔹 /cartoon_yt - сгенерировать 12 мультяшных сцен

        🔹 /cartoon_shorts - сгенерировать 1 мультяшную сцену для шортсов (9:16)
      random_character: "Генерирую случайного персонажа."
      brainrot_character: "Генерирую brainrot-персонажа."
      cartoon_character: "Генерирую мультяшного персонажа."
