      prompt_policy: |
        Правила промптов 🛡

        ♦️ Нельзя запрашивать сексуальный контент.

        ♦️ Нельзя запрашивать жестокое насилие, самоповреждение или опасные противоправные действия.

        ♦️ Нельзя запрашивать контент с ненавистью или травлей.
      balance:
        one: "Текущий баланс: %{balance} кредит."
        few: "Текущий баланс: %{balance} кредита."
        many: "Текущий баланс: %{balance} кредитов."
        other: "Текущий баланс: %{balance} кредитов."
      activate_token:
