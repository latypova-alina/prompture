          🤖 С помощью этого бота ты можешь создавать изображения, видео и аудио с использованием различных AI-моделей.

          🎨 Чтобы создать изображение:
          /prompt_to_image

          🔊 Чтобы создать аудио:
          /prompt_to_audio

          🎬 Чтобы создать видео:
          /prompt_to_video

          💰 Чтобы проверить баланс:
          /balance
      help: |
        🤖 С помощью этого бота ты можешь создавать изображения, видео и аудио с использованием различных AI-моделей.

        🎨 Чтобы создать изображение:
        /prompt_to_image

        🔊 Чтобы создать аудио:
        /prompt_to_audio

        🎬 Чтобы создать видео:
        /prompt_to_video

        💰 Чтобы проверить баланс:
        /balance

        🔑 Чтобы активировать токен, введи:
          /activate_token
        
        ℹ️ Каждая генерация выполняется за кредиты. Чтобы пополнить баланс, введи /activate_token и введи действительный токен.

        Токены предоставляются администратором.
