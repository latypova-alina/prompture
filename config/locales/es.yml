es:
  telegram_webhooks:
    commands:
      description:
        start: "🚀 Comienza a interactuar con el bot y recibe instrucciones sobre cómo usarlo"
        help: "❓ Obtén instrucciones sobre cómo usar el bot"
        balance: "💰 Consulta tu saldo actual"
        activate_token: "🔑 Activa un token"
        prompt_to_video: "🎬 Prompt → imagen → video"
        prompt_to_image: "🖼 Prompt → imagen"
        prompt_to_audio: "🔊 Prompt → audio"
        prompt_policy: "🛡 Ver reglas de prompts"
        set_locale: "🌐 Cambiar idioma"
        image_to_video: "🖼🎬 Imagen → video"
        edit_image: "🖼✏️ Editar imagen"
      start:
        no_token: |
          👋 ¡Hola! Me alegra verte por aquí.

          🤖 Con este bot puedes generar imágenes, videos y audio usando diferentes modelos de IA.

          🎨 Para generar una imagen, escribe:
          /prompt_to_image

          🔊 Para generar audio, escribe:
          /prompt_to_audio

          🎬 Para generar un video, escribe:
          /prompt_to_video

          💰 Para consultar tu saldo, escribe:
          /balance

          🔑 Para activar un token, escribe:
          /activate_token

          ℹ️ Cada generación cuesta créditos.
          Para recargar tu saldo, usa /activate_token e introduce un token válido.

          Los tokens son proporcionados por el administrador.
        with_valid_token: |
          🤖 Con este bot puedes generar imágenes, videos y audio usando diferentes modelos de IA.

          🎨 Para generar una imagen:
          /prompt_to_image

          🔊 Para generar audio:
          /prompt_to_audio

          🎬 Para generar un video:
          /prompt_to_video

          💰 Para consultar tu saldo:
          /balance
      help: |
        🤖 Con este bot puedes generar imágenes, videos y audio usando diferentes modelos de IA.

        🎨 Para generar una imagen, escribe:
        /prompt_to_image

        🔊 Para generar audio, escribe:
        /prompt_to_audio

        🎬 Para generar un video, escribe:
        /prompt_to_video

        💰 Para consultar tu saldo, escribe:
        /balance

        🔑 Para activar un token, escribe:
        /activate_token

        ℹ️ Cada generación cuesta créditos.
        Para recargar tu saldo, usa /activate_token e introduce un token válido.

        Los tokens son proporcionados por el administrador.
      admin: |
        Aquí están los comandos disponibles para administradores:

        🔹 /random_script - genera un script aleatorio

        🔹 /motivation_workflow_en - guion motivacional, audio y prompts de video cinematográficos (inglés)

        🔹 /motivation_workflow_pl - guion motivacional, audio y prompts de video cinematográficos (polaco)

        🔹 /motivation_workflow_ru - guion motivacional, audio y prompts de video cinematográficos (ruso)

        🔹 /generate_script %template_name% - genera un script desde el parametro template_name

        🔹 /script_templates - muestra las plantillas de scripts disponibles

        🔹 /random_character - genera una imagen de personaje aleatorio

        🔹 /brainrot_character - genera una imagen de personaje brainrot aleatorio

        🔹 /cartoon_character - genera una imagen de personaje de dibujos animados para preescolares

        🔹 /cartoon_yt - genera 12 escenas de dibujos animados

        🔹 /cartoon_shorts - genera 1 escena de dibujos animados para shorts (9:16)
      random_character: "Generación de personaje aleatorio iniciada."
      brainrot_character: "Generación de personaje brainrot iniciada."
      cartoon_character: "Generación de personaje de dibujos animados iniciada."
      cartoon_yt: "Generación de guion de dibujos animados iniciada."
      cartoon_shorts: "Generación de guion de dibujos animados para shorts iniciada."
      motivation_workflow: "Workflow motivacional iniciado: guion, audio y prompts de video."
      prompt_to_video: "¡Genial! Ahora, por favor, proporciona un prompt para el video. Más adelante podrás ampliarlo con la ayuda del bot."
      prompt_to_image: "¡Genial! Ahora, por favor, proporciona un prompt para la imagen. Más adelante podrás ampliarlo con la ayuda del bot."
      prompt_to_audio: "¡Genial! Ahora, por favor, proporciona un prompt para el audio."
      image_to_video: |
        ¡Genial! Ahora, por favor, envíame la imagen que quieres convertir en un video.
        Puedes enviarla como:

        🔹 una URL 🔗 (puedes copiar una de mensajes anteriores si hace falta)
        🔹 una imagen 🖼
        🔹 un archivo 📁

        Ten en cuenta que la imagen debe tener al menos 300x300 píxeles y ser menor de 10 MB.
      edit_image: |
        ¡Genial! Envía la imagen que quieres editar.
        Puedes enviarla como:

        🔹 una URL 🔗
        🔹 una imagen 🖼
        🔹 un archivo 📁

        Ten en cuenta que la imagen debe tener al menos 300x300 píxeles y ser menor de 10 MB.
      prompt_policy: |
        Politica de prompts 🛡

        ♦️ No solicites contenido sexual.

        ♦️ No solicites violencia grafica, autolesiones o actos peligrosos e ilegales.

        ♦️ No solicites contenido de odio o acoso.
      balance:
        one: "Tu saldo actual es de %{balance} crédito."
        other: "Tu saldo actual es de %{balance} créditos."
      activate_token:
        ask: "Por favor, introduce tu token para activarlo:"
        activated: |
          ✅ ¡Tu token ha sido activado correctamente!

          🎉 Has recibido %{credits} créditos.
      set_locale:
        ask: "Por favor, selecciona tu idioma preferido:"
        locale_updated: "Tu idioma ha sido actualizado 🌐"
    message:
      image_message_url: "Aquí está tu imagen"
      image_message_reply: "¡Genial! Ahora puedes generar un video usando uno de los procesadores (Kling)"
      image_to_video_image_reply: "¡Genial! Puedes generar un video con Kling o proporcionar un prompt primero."
      image_to_video_prompt_reply: "¡Genial! Ahora, por favor, proporciona un prompt para el video."
      edit_image_prompt_reply: "¡Genial! Ahora envía tu prompt de edición."
      extended_prompt_postfix: "Aquí está tu prompt extendido ⬆️ \n\nAhora puedes generar una imagen usando uno de los procesadores (Flux/NanoBanana)"
      image_generated_prefix: "Aquí está tu %{processor_name} 🖼️"
      image_generated_postfix: "Ahora puedes generar un video usando uno de los procesadores (Kling)"
      video_generated_prefix: "Aquí está tu %{processor_name} 🎥"
      audio_generated_prefix: "Aquí está tu %{processor_name} 🔊"
      merge_processed_prefix: "Aquí está tu %{processor_name} 🎬"
      merge_processed: "Abrir video combinado"
      prompt_suffix: |
        ¿Qué quieres hacer a continuación? Puedes:

        🔹 extender el prompt
          
        🔹 generar una imagen usando uno de los procesadores (Flux/NanoBanana)
      prompt_suffix_audio: |
        ¿Qué quieres hacer a continuación? Puedes:

        🔹 generar audio usando ElevenLabs Turbo
      provide_prompt: "Por favor, proporciona la descripción (opcional)"
