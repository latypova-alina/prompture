version: v1.0
name: Initial Pipeline
agent:
  machine:
    type: f1-standard-2
    os_image: ubuntu2204
blocks:
  - name: Code scanning
    task:
      jobs:
        - name: Rubocop
          commands:
            - checkout
            - bundle install
            - bundle exec rubocop
  - name: Tests
    task:
      jobs:
        - name: 'Rspec '
          services:
            - postgres
          env_vars:
            - name: RAILS_ENV
              value: test
          commands:
            - checkout
            - bundle install
            - bundle exec rails db:prepare
            - bundle exec rspec
