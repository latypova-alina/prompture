version: v1.0
name: Initial Pipeline
agent:
  machine:
    type: f1-standard-2
    os_image: ubuntu2204
blocks:
  - name: Code scanning
    task:
      jobs:
        - name: Rubocop
          commands:
            - checkout
            - bundle install
            - bundle exec rubocop
  - name: Tests
    task:
      env_vars:
        - name: RAILS_ENV
          value: test
        - name: PGHOST
          value: localhost
        - name: PGUSER
          value: postgres
        - name: PGPASSWORD
          value: ""
      jobs:
        - name: Rspec
          commands:
            - checkout
            - bundle install
            - sem-service start postgres
            - bundle exec rails db:prepare
            - bundle exec rspec
